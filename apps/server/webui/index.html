<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Control — DnD Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#0a0a0a;
  --bg-elevated:#141414;
  --bg-card:#1a1a1a;
  --bg-hover:#232323;
  --bg-active:#2a2a2a;
  --border-color:#282828;
  --text-primary:#ffffff;
  --text-secondary:#a0a0a0;
  --text-tertiary:#727272;
  --accent:#1db954;
  --accent-hover:#1ed760;
  --accent-dim:#1db95433;
  --danger:#e74c3c;
  --danger-hover:#ff6b6b;
  --radius:8px;
  --radius-sm:4px;
  --radius-lg:12px;
  --font:'Inter','system-ui',-apple-system,sans-serif;
  --sidebar-width:260px;
  --player-height:88px;
}
html,body{height:100%;font-family:var(--font);background:var(--bg-base);color:var(--text-primary);overflow:hidden;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-hover)}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input{font:inherit;color:inherit}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-hover);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--bg-active)}

/* Layout */
.app{display:flex;height:100vh;flex-direction:column}
.app-body{display:flex;flex:1;overflow:hidden;padding-bottom:var(--player-height)}

/* Sidebar */
.sidebar{
  width:var(--sidebar-width);
  background:var(--bg-elevated);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  border-right:1px solid var(--border-color);
}
.sidebar-header{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border-color);
  display:flex;
  align-items:center;
  gap:10px;
}
.sidebar-header svg{flex-shrink:0}
.sidebar-header h1{font-size:15px;font-weight:700;letter-spacing:-0.01em;color:var(--text-primary)}
.sidebar-header .status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--text-tertiary);
  margin-left:auto;flex-shrink:0;
  transition:background .3s;
}
.sidebar-header .status-dot.active{background:var(--accent);box-shadow:0 0 8px var(--accent-dim)}

.sidebar-nav{padding:12px 8px;border-bottom:1px solid var(--border-color)}
.sidebar-nav a{
  display:flex;align-items:center;gap:12px;
  padding:8px 12px;border-radius:var(--radius);
  color:var(--text-secondary);font-weight:500;font-size:13px;
  transition:all .15s;
}
.sidebar-nav a:hover{color:var(--text-primary);background:var(--bg-hover)}
.sidebar-nav a.active{color:var(--text-primary);background:var(--bg-active)}

.sidebar-section{padding:12px 8px;flex:1;overflow-y:auto}
.sidebar-section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 12px 8px;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.05em;color:var(--text-tertiary);
}
.sidebar-category{
  display:flex;align-items:center;gap:10px;
  padding:7px 12px;border-radius:var(--radius);
  color:var(--text-secondary);font-size:13px;font-weight:500;
  transition:all .15s;cursor:pointer;
}
.sidebar-category:hover{color:var(--text-primary);background:var(--bg-hover)}
.sidebar-category.active{color:var(--text-primary);background:var(--bg-active)}
.sidebar-category .count{
  margin-left:auto;font-size:11px;color:var(--text-tertiary);
  background:var(--bg-card);padding:1px 7px;border-radius:10px;
}

/* Main content */
.main-content{flex:1;overflow-y:auto;padding:0;background:var(--bg-base)}
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;gap:12px;
  position:sticky;top:0;z-index:10;
  background:linear-gradient(180deg,var(--bg-base) 60%,transparent);
}
.top-bar h2{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.top-actions{display:flex;gap:8px;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:20px;
  font-size:13px;font-weight:600;
  transition:all .15s;white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent-hover);transform:scale(1.02)}
.btn-outline{
  border:1px solid var(--border-color);color:var(--text-primary);
  background:transparent;
}
.btn-outline:hover{background:var(--bg-hover);border-color:var(--text-tertiary)}
.btn-icon{
  width:32px;height:32px;border-radius:50%;
  display:grid;place-items:center;
  transition:all .15s;
}
.btn-icon:hover{background:var(--bg-hover)}

/* Track list */
.track-list{padding:0 24px 24px}
.track-list-header{
  display:grid;
  grid-template-columns:32px 1fr 100px 60px;
  gap:12px;
  padding:8px 12px;
  border-bottom:1px solid var(--border-color);
  font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.05em;
  color:var(--text-tertiary);margin-bottom:4px;
}
.track-item{
  display:grid;
  grid-template-columns:32px 1fr 100px 40px;
  gap:12px;
  padding:8px 12px;
  border-radius:var(--radius);
  cursor:pointer;
  transition:background .15s;
  align-items:center;
  position:relative;
}
.track-item:hover{background:var(--bg-hover)}
.track-item.playing{background:var(--accent-dim)}
.track-item .num{text-align:center;font-size:13px;color:var(--text-tertiary);grid-column:1}
.track-item .play-icon-btn{display:none;grid-column:1;justify-self:center;color:var(--accent)}
.track-item:hover .num{display:none}
.track-item:hover .play-icon-btn{display:flex}

.track-info{display:flex;flex-direction:column;min-width:0}
.track-info .title{font-size:14px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-info .meta{font-size:12px;color:var(--text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.track-duration{font-size:13px;color:var(--text-secondary);text-align:right}

/* Player bar */
.player-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--player-height);
  background:var(--bg-elevated);
  border-top:1px solid var(--border-color);
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  align-items:center;
  padding:0 16px;
  z-index:100;
}
.player-now-playing{display:flex;align-items:center;gap:12px;min-width:0}
.player-now-playing .info{min-width:0}
.player-now-playing .info .title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-now-playing .info .subtitle{font-size:11px;color:var(--text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.player-controls{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  max-width:600px;margin:0 auto;width:100%;
}
.player-buttons{display:flex;align-items:center;gap:16px}
.player-buttons button{transition:all .15s}
.player-buttons button:hover{color:var(--text-primary)}
.player-buttons button:active{transform:scale(0.92)}
.player-buttons .play-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--text-primary);color:#000;
  display:grid;place-items:center;
  transition:all .15s;
}
.player-buttons .play-btn:hover{transform:scale(1.06);background:var(--accent-hover);color:#000}
.player-progress{
  display:flex;align-items:center;gap:8px;width:100%;
}
.player-progress .time{font-size:11px;color:var(--text-tertiary);min-width:36px;text-align:center}
.progress-bar{
  flex:1;height:4px;border-radius:2px;
  background:var(--bg-active);cursor:pointer;position:relative;
}
.progress-bar-fill{
  height:100%;border-radius:2px;
  background:var(--text-primary);transition:width .5s linear;
  max-width:100%;position:relative;
}
.progress-bar:hover .progress-bar-fill{background:var(--accent)}
.progress-bar-thumb{
  position:absolute;right:-6px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;border-radius:50%;
  background:var(--text-primary);opacity:0;transition:opacity .15s;
}
.progress-bar:hover .progress-bar-thumb{opacity:1}

.player-extras{
  display:flex;align-items:center;justify-content:flex-end;gap:8px;
}
.player-extras button{color:var(--text-tertiary);transition:all .15s}
.player-extras button:hover{color:var(--text-primary)}
.player-extras button.active{color:var(--accent)}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:200;display:grid;place-items:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg-elevated);border-radius:var(--radius-lg);
  padding:24px;width:480px;max-width:90vw;
  border:1px solid var(--border-color);
}
.modal h3{font-size:18px;font-weight:700;margin-bottom:4px}
.modal p{color:var(--text-secondary);font-size:13px;margin-bottom:20px}
.modal label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
.form-group{margin-bottom:16px}
.form-input{
  width:100%;padding:10px 12px;border-radius:var(--radius);
  background:var(--bg-card);border:1px solid var(--border-color);
  color:var(--text-primary);font-size:14px;transition:border .15s;
}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-input::placeholder{color:var(--text-tertiary)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.btn-success{background:var(--accent);color:#000}
.btn-success:hover{background:var(--accent-hover)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}

/* Queue panel */
.queue-panel{
  width:300px;background:var(--bg-elevated);
  border-left:1px solid var(--border-color);
  display:flex;flex-direction:column;flex-shrink:0;
  overflow:hidden;
}
.queue-panel-header{
  padding:16px;font-size:13px;font-weight:600;
  border-bottom:1px solid var(--border-color);
  display:flex;align-items:center;justify-content:space-between;
}
.queue-list{flex:1;overflow-y:auto;padding:8px}
.queue-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:var(--radius);
  cursor:pointer;transition:background .15s;
}
.queue-item:hover{background:var(--bg-hover)}
.queue-item.current{background:var(--accent-dim)}
.queue-item .q-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.queue-item .q-num{font-size:11px;color:var(--text-tertiary);width:20px;text-align:center;flex-shrink:0}
.queue-item .q-del{color:var(--text-tertiary);flex-shrink:0;opacity:0;transition:opacity .15s}
.queue-item:hover .q-del{opacity:1}
.queue-item .q-del:hover{color:var(--danger)}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;gap:8px}
.empty-state svg{opacity:.3;margin-bottom:8px}
.empty-state h3{font-size:16px;font-weight:600}
.empty-state p{color:var(--text-secondary);font-size:13px;max-width:320px}

/* Loading */
.spinner{width:20px;height:20px;border:2px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:var(--bg-elevated);border:1px solid var(--border-color);
  padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:500;z-index:300;
  opacity:0;transition:all .3s;pointer-events:none;
  backdrop-filter:blur(12px);
}
.toast.show{opacity:1;bottom:110px}

/* Empty player cache state */
.player-empty{display:flex;flex-direction:column;align-items:center;gap:4px}
.player-empty .title{font-size:12px;color:var(--text-tertiary)}
.player-empty .subtitle{font-size:11px;color:var(--text-tertiary)}

@media(max-width:768px){
  .sidebar{display:none}
  .queue-panel{display:none}
  .player-bar{grid-template-columns:1fr 1fr;padding:0 12px;gap:8px}
  .player-now-playing{display:none}
  .player-controls{grid-column:1/-1}
  .player-extras{display:none}
  .top-bar{padding:12px 16px}
  .top-bar h2{font-size:18px}
  .track-list{padding:0 12px 12px}
  .track-list-header{grid-template-columns:32px 1fr 60px}
  .track-item{grid-template-columns:32px 1fr 60px}
  .track-duration{display:none}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="app-body">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--accent)">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
        <h1>Session Music</h1>
        <div class="status-dot" id="statusDot" title="Disconnected"></div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="active" data-view="library">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
          Library
        </a>
        <a href="#" data-view="queue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
          Queue
        </a>
      </nav>
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span>Categories</span>
          <button id="newCategoryBtn" class="btn-icon" title="New Category" style="width:24px;height:24px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          </button>
        </div>
        <div id="categoryList"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <div class="top-bar">
        <h2 id="viewTitle">Library</h2>
        <div class="top-actions">
          <button class="btn btn-primary" id="addMusicBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            Add Music
          </button>
        </div>
      </div>
      <div id="viewContent"></div>
    </main>

    <!-- Queue Panel -->
    <aside class="queue-panel" id="queuePanel">
      <div class="queue-panel-header">
        <span>Queue</span>
        <button class="btn-icon" id="clearQueueBtn" title="Clear queue" style="width:24px;height:24px;color:var(--text-tertiary)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="queue-list" id="queueList">
        <div class="empty-state">
          <p style="color:var(--text-tertiary);font-size:13px">Queue is empty</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- Player Bar -->
  <footer class="player-bar" id="playerBar">
    <div class="player-now-playing" id="nowPlaying">
      <div class="info player-empty">
        <div class="title">No track playing</div>
        <div class="subtitle">Add music to get started</div>
      </div>
    </div>

    <div class="player-controls">
      <div class="player-buttons">
        <button id="prevBtn" class="btn-icon" title="Previous" style="width:30px;height:30px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="playBtn" class="play-btn" title="Play/Pause">
          <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="nextBtn" class="btn-icon" title="Next" style="width:30px;height:30px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div class="player-progress">
        <span class="time" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-bar-fill" id="progressFill" style="width:0%">
            <div class="progress-bar-thumb"></div>
          </div>
        </div>
        <span class="time" id="totalTime">0:00</span>
      </div>
    </div>

    <div class="player-extras">
      <button class="btn-icon" id="loopBtn" title="Loop" style="width:30px;height:30px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>
      <button class="btn-icon" id="shuffleBtn" title="Shuffle" style="width:30px;height:30px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
    </div>
  </footer>
</div>

<!-- Add Music Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Add Music</h3>
    <p>Paste a YouTube link or playlist URL to download tracks.</p>
    <div class="form-group">
      <label for="ytUrl">YouTube URL</label>
      <input type="text" class="form-input" id="ytUrl" placeholder="https://youtube.com/watch?v=... or playlist link">
    </div>
    <div class="form-group">
      <label for="ytCategory">Category (optional)</label>
      <input type="text" class="form-input" id="ytCategory" placeholder="e.g. Combat, Exploration, Tavern">
    </div>
    <div id="downloadProgress" style="display:none;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span class="spinner"></span>
        <span style="font-size:13px;color:var(--text-secondary)" id="progressText">Downloading...</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="cancelDownload">Cancel</button>
      <button class="btn btn-success" id="confirmDownload">Download</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// === State ===
const TOKEN = new URLSearchParams(window.location.search).get('token');
if (!TOKEN) {
  document.body.innerHTML = `<div style="display:grid;place-items:center;height:100vh;background:var(--bg-base);color:var(--text-secondary)"><div style="text-align:center"><h2 style="color:var(--text-primary);margin-bottom:8px">No Session</h2><p>Missing control token. Use <code>/music start</code> in Discord.</p></div></div>`;
  throw new Error('No token');
}

const API_BASE = '/api/music';
let state = null;
let pollInterval = null;
let currentView = 'library';
let selectedCategoryId = null;
let currentTrackId = null;

// === DOM refs ===
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const statusDot = $('#statusDot');
const viewTitle = $('#viewTitle');
const viewContent = $('#viewContent');
const categoryList = $('#categoryList');
const queueList = $('#queueList');
const addMusicBtn = $('#addMusicBtn');
const addModal = $('#addModal');
const ytUrl = $('#ytUrl');
const ytCategory = $('#ytCategory');
const confirmDownload = $('#confirmDownload');
const cancelDownload = $('#cancelDownload');
const downloadProgress = $('#downloadProgress');
const progressText = $('#progressText');
const playBtn = $('#playBtn');
const playIcon = $('#playIcon');
const prevBtn = $('#prevBtn');
const nextBtn = $('#nextBtn');
const shuffleBtn = $('#shuffleBtn');
const loopBtn = $('#loopBtn');
const progressBar = $('#progressBar');
const progressFill = $('#progressFill');
const currentTime = $('#currentTime');
const totalTime = $('#totalTime');
const nowPlaying = $('#nowPlaying');
const clearQueueBtn = $('#clearQueueBtn');
const toast = $('#toast');

// === Helpers ===
function api(path, opts = {}) {
  const headers = { 'x-control-token': TOKEN, ...opts.headers };
  if (opts.body && !(opts.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
  }
  // Default to POST when sending a body, unless method explicitly set
  const method = opts.method || (opts.body ? 'POST' : 'GET');
  return fetch(`${API_BASE}${path}`, {
    ...opts,
    method,
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  }).then(r => r.json());
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function showToast(msg, duration = 3000) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), duration);
}

// === Polling ===
async function pollState() {
  try {
    const res = await api('/state');
    if (res.error) {
      statusDot.className = 'status-dot';
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
      return;
    }
    state = res.state;
    updateUI();
  } catch (err) {
    console.error('Poll failed:', err);
  }
}

// === Category fetching ===
let allCategories = [];
let allTracks = [];

async function fetchLibrary() {
  const [catRes, trackRes] = await Promise.all([
    api('/categories'),
    api('/tracks'),
  ]);
  if (catRes.ok) allCategories = catRes.categories;
  if (trackRes.ok) allTracks = trackRes.tracks;
  renderCategories();
  renderCurrentView();
}

// === Render ===
function renderCategories() {
  categoryList.innerHTML = '';
  // "All Tracks" pseudo-category
  const allItem = document.createElement('div');
  allItem.className = `sidebar-category${!selectedCategoryId ? ' active' : ''}`;
  allItem.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg><span>All Tracks</span><span class="count">${allTracks.length}</span>`;
  allItem.onclick = () => { selectedCategoryId = null; renderCategories(); renderCurrentView(); };
  categoryList.appendChild(allItem);

  // Saved playlists (smart "categories" as playlists)
  const savedItem = document.createElement('div');
  savedItem.className = `sidebar-category${selectedCategoryId === '_saved' ? ' active' : ''}`;
  savedItem.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>Favorites</span><span class="count">0</span>`;
  savedItem.onclick = () => { selectedCategoryId = '_saved'; renderCategories(); renderCurrentView(); };
  categoryList.appendChild(savedItem);

  // Real categories
  for (const cat of allCategories) {
    const el = document.createElement('div');
    el.className = `sidebar-category${selectedCategoryId === cat.id ? ' active' : ''}`;
    el.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg><span>${cat.name}</span><span class="count">${cat.trackCount}</span>`;
    el.onclick = () => { selectedCategoryId = cat.id; renderCategories(); renderCurrentView(); };
    categoryList.appendChild(el);
  }
}

function renderCurrentView() {
  if (currentView === 'library') {
    renderLibrary();
  } else if (currentView === 'queue') {
    renderQueueView();
  }
}

function renderLibrary() {
  let tracks = allTracks;
  let title = 'All Tracks';

  if (selectedCategoryId === '_saved') {
    // Favorites - not yet implemented
    tracks = [];
    title = 'Favorites';
  } else if (selectedCategoryId) {
    const cat = allCategories.find(c => c.id === selectedCategoryId);
    if (cat) {
      title = cat.name;
      // We need track IDs
      tracks = allTracks.filter(t => t.category === cat.name);
    }
  }

  viewTitle.textContent = title;

  if (tracks.length === 0) {
    viewContent.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="var(--text-tertiary)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        <h3>No tracks yet</h3>
        <p>Click "Add Music" to download tracks from YouTube.</p>
        <button class="btn btn-primary" onclick="document.getElementById('addMusicBtn').click()" style="margin-top:12px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          Add Music
        </button>
      </div>`;
    return;
  }

  let html = `<div class="track-list"><div class="track-list-header"><span>#</span><span>Title</span><span>Duration</span><span></span></div>`;
  for (let i = 0; i < tracks.length; i++) {
    const t = tracks[i];
    const isPlaying = state && state.queue[state.currentIndex]?.trackId === t.id;
    html += `
      <div class="track-item${isPlaying ? ' playing' : ''}" data-track-id="${t.id}" data-index="${i}">
        <span class="num">${i + 1}</span>
        <button class="btn-icon play-icon-btn" title="Play" data-track-id="${t.id}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="track-info">
          <div class="title">${escapeHtml(t.title)}</div>
          <div class="meta">${escapeHtml(t.category || 'uncategorized')}</div>
        </div>
        <div class="track-duration">${formatTime(t.duration)}</div>
        <div>
          <button class="btn-icon add-queue-btn" title="Add to queue" style="width:28px;height:28px;color:var(--text-tertiary)" data-track-id="${t.id}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
          </button>
        </div>
      </div>`;
  }
  html += '</div>';
  viewContent.innerHTML = html;

  // Bind events
  viewContent.querySelectorAll('.play-icon-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); playTrack(btn.dataset.trackId); };
  });
  viewContent.querySelectorAll('.add-queue-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); addToQueue(btn.dataset.trackId); };
  });
  viewContent.querySelectorAll('.track-item').forEach(item => {
    item.onclick = () => playTrack(item.dataset.trackId);
  });
}

function renderQueueView() {
  viewTitle.textContent = 'Queue';
  if (!state || !state.queue || state.queue.length === 0) {
    viewContent.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="var(--text-tertiary)"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
        <h3>Queue is empty</h3>
        <p>Browse the library and add tracks to the queue.</p>
      </div>`;
    return;
  }

  let html = `<div class="track-list"><div class="track-list-header"><span>#</span><span>Title</span><span>Duration</span><span></span></div>`;
  for (let i = 0; i < state.queue.length; i++) {
    const q = state.queue[i];
    const isCurrent = i === state.currentIndex;
    html += `
      <div class="track-item${isCurrent ? ' playing' : ''}" data-queue-index="${i}">
        <span class="num">${i + 1}</span>
        <button class="btn-icon play-icon-btn" title="Play" data-queue-track="${q.trackId}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="track-info">
          <div class="title">${escapeHtml(q.title)}${isCurrent ? ' <span style="color:var(--accent);font-size:11px">NOW</span>' : ''}</div>
          <div class="meta">${isCurrent ? 'Currently playing' : ''}</div>
        </div>
        <div class="track-duration">${formatTime(q.duration)}</div>
        <div>
          <button class="btn-icon remove-queue-btn" title="Remove" style="width:28px;height:28px;color:var(--text-tertiary)" data-queue-index="${i}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </div>`;
  }
  html += '</div>';
  viewContent.innerHTML = html;

  viewContent.querySelectorAll('.remove-queue-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); removeFromQueue(parseInt(btn.dataset.queueIndex)); };
  });
  viewContent.querySelectorAll('.play-icon-btn').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); playTrack(btn.dataset.queueTrack); };
  });
}

function renderQueuePanel() {
  if (!state || !state.queue || state.queue.length === 0) {
    queueList.innerHTML = `<div class="empty-state"><p style="color:var(--text-tertiary);font-size:13px">Queue is empty</p></div>`;
    return;
  }

  let html = '';
  for (let i = 0; i < state.queue.length; i++) {
    const q = state.queue[i];
    const isCurrent = i === state.currentIndex && state.isPlaying;
    html += `
      <div class="queue-item${isCurrent ? ' current' : ''}" data-queue-index="${i}">
        <span class="q-num">${i + 1}</span>
        <div class="q-title">${escapeHtml(q.title)}</div>
        <button class="btn-icon q-del" data-queue-index="${i}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>`;
  }
  queueList.innerHTML = html;

  queueList.querySelectorAll('.queue-item').forEach(item => {
    item.onclick = () => {
      const idx = parseInt(item.dataset.queueIndex);
      // Play this queue item
      const qItem = state.queue[idx];
      if (qItem) playTrack(qItem.trackId);
    };
  });
  queueList.querySelectorAll('.q-del').forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); removeFromQueue(parseInt(btn.dataset.queueIndex)); };
  });
}

function updateNowPlaying() {
  if (state && state.currentIndex >= 0 && state.queue[state.currentIndex]) {
    const q = state.queue[state.currentIndex];
    nowPlaying.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:48px;height:48px;border-radius:4px;background:var(--bg-active);display:grid;place-items:center;flex-shrink:0">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--text-tertiary)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <div class="info">
          <div class="title">${escapeHtml(q.title)}</div>
          <div class="subtitle">${state.isPlaying ? 'Now Playing' : 'Paused'}</div>
        </div>
      </div>`;
  } else {
    nowPlaying.innerHTML = `
      <div class="info player-empty">
        <div class="title">No track playing</div>
        <div class="subtitle">Add music to get started</div>
      </div>`;
  }
}

function updateUI() {
  if (!state) return;

  // Status
  statusDot.className = 'status-dot active';

  // Play button
  if (state.isPlaying) {
    playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  } else {
    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }

  // Shuffle
  shuffleBtn.classList.toggle('active', state.shuffle);

  // Loop
  loopBtn.classList.toggle('active', state.loop);

  // Progress - approximate since we don't have real-time position
  // We'll just set to 0 and let the track start
  updateNowPlaying();
  renderQueuePanel();

  // Re-render current view to update playing states
  if (currentView === 'library') renderLibrary();
  else if (currentView === 'queue') renderQueueView();
}

// === Actions ===
async function playTrack(trackId) {
  const res = await api('/play', { body: { trackId } });
  if (res.ok) {
    state = res.state;
    updateUI();
    showToast('Playing track');
    startProgressSimulation();
  } else {
    showToast(res.error || 'Failed to play', 3000);
  }
}

async function togglePlay() {
  const res = await api('/pause');
  if (res.ok) {
    state = res.state;
    updateUI();
  }
}

async function nextTrack() {
  const res = await api('/next');
  if (res.ok) {
    state = res.state;
    updateUI();
    startProgressSimulation();
  }
}

async function prevTrack() {
  const res = await api('/previous');
  if (res.ok) {
    state = res.state;
    updateUI();
    startProgressSimulation();
  }
}

async function addToQueue(trackId) {
  const res = await api('/queue/add', { body: { trackId } });
  if (res.ok) {
    state = res.state;
    updateUI();
    showToast('Added to queue');
  }
}

async function removeFromQueue(index) {
  const res = await api(`/queue/${index}`, { method: 'DELETE' });
  if (res.ok) {
    state = res.state;
    updateUI();
  }
}

async function clearQueue() {
  const res = await api('/queue/clear', { method: 'POST' });
  if (res.ok) {
    state = res.state;
    updateUI();
    showToast('Queue cleared');
  }
}

async function toggleShuffle() {
  const res = await api('/shuffle', { method: 'POST' });
  if (res.ok) {
    state = res.state;
    updateUI();
    showToast(state.shuffle ? 'Shuffle on' : 'Shuffle off');
  }
}

async function toggleLoop() {
  const res = await api('/loop', { method: 'POST' });
  if (res.ok) {
    state = res.state;
    updateUI();
    showToast(state.loop ? 'Loop on' : 'Loop off');
  }
}

// Progress simulation
let progressInterval = null;
let progressStart = Date.now();

function startProgressSimulation() {
  clearInterval(progressInterval);
  if (!state || state.currentIndex < 0 || !state.queue[state.currentIndex]) {
    progressFill.style.width = '0%';
    currentTime.textContent = '0:00';
    totalTime.textContent = '0:00';
    return;
  }

  const track = state.queue[state.currentIndex];
  const duration = track.duration || 0;
  totalTime.textContent = formatTime(duration);
  progressStart = Date.now();

  if (!state.isPlaying) {
    progressFill.style.width = '0%';
    currentTime.textContent = '0:00';
    return;
  }

  progressInterval = setInterval(() => {
    const elapsed = (Date.now() - progressStart) / 1000;
    if (elapsed >= duration) {
      currentTime.textContent = formatTime(duration);
      progressFill.style.width = '100%';
      clearInterval(progressInterval);
      return;
    }
    currentTime.textContent = formatTime(elapsed);
    progressFill.style.width = `${(elapsed / duration) * 100}%`;
  }, 200);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// === Navigation ===
document.querySelectorAll('.sidebar-nav a').forEach(a => {
  a.onclick = (e) => {
    e.preventDefault();
    document.querySelectorAll('.sidebar-nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    currentView = a.dataset.view;
    renderCurrentView();
  };
});

// === Add Music Modal ===
addMusicBtn.onclick = () => {
  addModal.classList.add('open');
  ytUrl.value = '';
  ytCategory.value = '';
  downloadProgress.style.display = 'none';
};

cancelDownload.onclick = () => addModal.classList.remove('open');

addModal.onclick = (e) => {
  if (e.target === addModal) addModal.classList.remove('open');
};

confirmDownload.onclick = async () => {
  const url = ytUrl.value.trim();
  if (!url) { showToast('Please enter a YouTube URL', 3000); return; }

  confirmDownload.disabled = true;
  confirmDownload.textContent = 'Starting...';
  downloadProgress.style.display = 'block';
  progressText.innerHTML = 'Starting download...<div class="progress-bar" style="margin-top:8px;height:6px"><div class="progress-bar-fill" id="dlProgressFill" style="width:0%;background:var(--accent);height:100%;border-radius:3px;transition:width .3s"></div></div>';

  try {
    const res = await api('/download', {
      body: { url, category: ytCategory.value.trim() || undefined },
    });

    if (res.error) {
      showToast(`Download failed: ${res.error}`, 5000);
      return;
    }

    const jobId = res.jobId;
    confirmDownload.textContent = 'Downloading...';

    // Poll for progress
    let done = false;
    while (!done) {
      await new Promise(r => setTimeout(r, 500));
      const prog = await api(`/download/progress/${jobId}`);
      if (prog.error) {
        showToast('Lost track of download job', 5000);
        break;
      }

      const j = prog.job;
      const bar = document.getElementById('dlProgressFill');
      if (bar) bar.style.width = `${j.progress}%`;

      if (j.type === 'playlist' && j.currentTrack && j.trackCount) {
        progressText.innerHTML = `${j.message} &mdash; Track ${j.currentTrack}/${j.trackCount}<div class="progress-bar" style="margin-top:8px;height:6px"><div class="progress-bar-fill" style="width:${j.progress}%;background:var(--accent);height:100%;border-radius:3px;transition:width .3s"></div></div>`;
      } else {
        progressText.innerHTML = `${j.message}<div class="progress-bar" style="margin-top:8px;height:6px"><div class="progress-bar-fill" style="width:${j.progress}%;background:var(--accent);height:100%;border-radius:3px;transition:width .3s"></div></div>`;
      }

      if (j.status === 'completed') {
        done = true;
        progressText.innerHTML = `<span style="color:var(--accent)">✓ ${j.message}</span>`;
        await new Promise(r => setTimeout(r, 800));
        showToast(`Downloaded successfully!`, 3000);
        addModal.classList.remove('open');
        await fetchLibrary();
        await pollState();
      } else if (j.status === 'error') {
        done = true;
        showToast(`Download failed: ${j.error}`, 5000);
      }
    }
  } catch (err) {
    showToast(`Download failed: ${err.message}`, 5000);
  } finally {
    confirmDownload.disabled = false;
    confirmDownload.textContent = 'Download';
    downloadProgress.style.display = 'none';
  }
};

// === Event bindings ===
playBtn.onclick = togglePlay;
nextBtn.onclick = nextTrack;
prevBtn.onclick = prevTrack;
shuffleBtn.onclick = toggleShuffle;
loopBtn.onclick = toggleLoop;
clearQueueBtn.onclick = clearQueue;

// Progress bar click to seek (approximate)
progressBar.onclick = (e) => {
  if (!state || !state.queue[state.currentIndex]) return;
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const duration = state.queue[state.currentIndex].duration || 0;
  progressFill.style.width = `${pct * 100}%`;
  currentTime.textContent = formatTime(duration * pct);
};

// === Init ===
async function init() {
  await fetchLibrary();
  await pollState();
  if (state) {
    statusDot.className = 'status-dot active';
    startProgressSimulation();
  }
  pollInterval = setInterval(pollState, 2000);
}

init();
</script>
